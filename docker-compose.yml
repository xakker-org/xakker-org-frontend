services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: xakker_app
    restart: unless-stopped
    ports:
      - "5173:80"

  landing:
    build:
      context: ./landing
    container_name: xakker_landing
    restart: unless-stopped
    ports:
      - "5174:80"

  admin:
    build:
      context: ./admin
    container_name: xakker_admin
    restart: unless-stopped
    ports:
      - "5175:80"

  proxy:
    image: nginx:alpine
    container_name: xakker_proxy
    restart: unless-stopped
    depends_on:
      - app
      - landing
      - admin
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
