<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/static/logo/logoXakker.png" />
    <title>Xakker Self Study</title>
    <meta
      name="description"
      content="Xakker self-study platformasının giriş səhifəsi"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <style>
        #xk-boot {
          display: flex;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          gap: 14px;
          min-height: 100vh;
          background: #0a0a0f;
        }
        #xk-boot .xk-spin {
          width: 34px;
          height: 34px;
          border: 3px solid rgba(255, 36, 66, 0.18);
          border-top-color: #ff2442;
          border-radius: 50%;
          animation: xk-rotate 0.75s linear infinite;
        }
        #xk-boot .xk-lbl {
          font-family: monospace;
          font-size: 11px;
          color: rgba(255, 255, 255, 0.25);
          letter-spacing: 0.18em;
          text-transform: uppercase;
        }
        @keyframes xk-rotate {
          to { transform: rotate(360deg); }
        }
      </style>
      <div id="xk-boot">
        <div class="xk-spin"></div>
        <div class="xk-lbl">xakker loading...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
